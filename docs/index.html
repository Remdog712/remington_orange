<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Remington Orange Portfolio</title>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300&display=swap" rel="stylesheet">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    #modelbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }
    #modelbox[aria-hidden="false"] { display: flex; }

    .modelbox-inner {
      width: min(1100px, 96vw);
      height: min(800px, 86vh);
      background: rgba(20,20,20,0.95);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
    }

    /* Mesh Control Bar */
    .model-controls {
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ccc;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'League Spartan', sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .control-btn.active {
      background: #ff7b00; /* Highlighting the active state */
      border-color: #ff7b00;
      color: white;
    }

    #modelbox-viewer {
      width: 100%;
      height: 100%;
      flex: 1;
      border-radius: 12px;
      background: #000;
      --poster-color: transparent;
    }

    #modelbox-caption { 
      color: #aaa; 
      font-size: 14px; 
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #modelbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>
  <header id="main-header">
    <div class="header-content">
      <div class="logo">
        <a href="index.html">
          <img src="WixMedia/Website/RO_Logo.png" alt="Remington Orange Logo" class="logo-image">
          <img src="WixMedia/Website/NameLogo.png" alt="Remington Orange Name Logo" class="name-logo">
        </a>
      </div>
      <nav>
        <ul>
          <li><a href="portfolio.html">Projects</a></li>
          <li><a href="about.html">About + Resume</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="about-blurb">
      <p>Welcome! I'm Remington Orange, a passionate photographer and 3D artist. Explore my work below.</p>
    </div>

    <div class="filter-container">
      <div class="filter-dropdown">
        <button class="filter-button"><i class="fas fa-filter"></i> Filter <i class="fas fa-chevron-down"></i></button>
        <div class="filter-menu">
          <button class="filter-option active" data-filter="all">All</button>
          <button class="filter-option" data-filter="3dworks">3D Works</button>
          <button class="filter-option" data-filter="photography">Photography</button>
          <button class="filter-option" data-filter="videos">Videos</button>
          <button class="filter-option" data-filter="paintings">Paintings</button>
          <button class="filter-option" data-filter="3dmodels">3D Models</button>
        </div>
      </div>
    </div>

    <div class="image-collage" id="image-collage"></div>
  </main>

  <div id="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged Image">
    <div id="lightbox-caption"></div>
  </div>

  <div id="videobox" aria-hidden="true">
    <div class="videobox-inner">
      <span id="videobox-close" aria-label="Close">&times;</span>
      <div class="videobox-header">
        <h2 id="videobox-title"></h2>
        <p id="videobox-description"></p>
      </div>
      <iframe
        id="videobox-frame"
        src=""
        title="Video player"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
      <div id="videobox-playlist" class="videobox-playlist"></div>
    </div>
  </div>

  <div id="modelbox" aria-hidden="true">
    <div class="modelbox-inner">
      <span id="modelbox-close" aria-label="Close">&times;</span>
      
      <div class="model-controls">
        <button id="toggle-wireframe" class="control-btn">
            <i class="fas fa-project-diagram"></i> Wireframe
        </button>
        <button id="toggle-auto-rotate" class="control-btn active">
            <i class="fas fa-sync-alt"></i> Auto-Rotate
        </button>
      </div>
    <div slot="progress-bar" class="progress-bar-container">
        <div class="update-bar"></div>
    </div>

      <model-viewer
        id="modelbox-viewer"
        alt="3D Model"
        src=""
        camera-controls
        auto-rotate
        loading="eager"
        reveal="auto"
        environment-image="neutral"
        shadow-intensity="1"
        exposure="1.2"
        poster=""
        touch-action="pan-y">
            <div slot="progress-bar" class="progress-bar-container">
        <div class="update-bar"></div>
    </div>
      </model-viewer>

      <div id="modelbox-caption"></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
